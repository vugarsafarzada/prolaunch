name: Cross-platform checks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-22.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install frontend dependencies
        run: npm ci

      - name: Check frontend build
        run: npm run build

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Check Tauri backend
        working-directory: src-tauri
        run: cargo check
